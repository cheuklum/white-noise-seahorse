<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>white noise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        body {
            font-family: 'Space Mono', monospace;
            background-image:
                linear-gradient(135deg, rgba(109, 59, 255, 0.6) 0%, rgba(139, 107, 191, 0.5) 40%, rgba(199, 184, 212, 0.4) 60%, rgba(245, 225, 229, 0.3) 100%),
                url('https://media.giphy.com/media/AMfWK3PFfUROcURLiq/giphy.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 400;
            text-transform: lowercase;
        }

        .gif-container {
            margin: 20px auto;
            text-align: center;
        }

        .gif-container img {
            width: 300px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .status {
            margin: 15px 0;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .controls {
            margin: 20px 0;
        }

        button {
            background: white;
            color: #6D3BFF;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-family: 'Space Mono', monospace;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.playing {
            background: #FF5373;
            color: white;
        }

        .noise-type {
            margin: 25px 0;
        }

        .noise-type label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9em;
            text-transform: lowercase;
        }

        select {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            outline: none;
        }

        select option {
            background: #6D3BFF;
            color: white;
        }

        .slider-control {
            margin: 20px 0;
        }

        .slider-control label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85em;
            text-transform: lowercase;
        }

        input[type="range"] {
            width: 100%;
            max-width: 400px;
            height: 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: none;
        }

        .slider-value {
            display: inline-block;
            margin-left: 10px;
            opacity: 0.7;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>white noise</h1>

        <div class="gif-container">
            <img src="seahorsegif.gif" alt="Seahorse animation" />
        </div>

        <p class="status" id="status">click to start</p>

        <div class="controls">
            <button id="toggleButton">play</button>
        </div>

        <div class="noise-type">
            <label for="noiseType">noise type</label>
            <select id="noiseType">
                <option value="white">white</option>
                <option value="pink">pink</option>
                <option value="brown">brown</option>
                <option value="blue">blue</option>
            </select>
        </div>

        <div class="slider-control">
            <label for="volume">volume <span class="slider-value" id="volumeValue">50</span></label>
            <input type="range" id="volume" min="0" max="100" value="50">
        </div>

        <div class="slider-control">
            <label for="lowpass">low-pass filter <span class="slider-value" id="lowpassValue">20000 hz</span></label>
            <input type="range" id="lowpass" min="200" max="20000" value="20000" step="100">
        </div>

        <div class="slider-control">
            <label for="highpass">high-pass filter <span class="slider-value" id="highpassValue">20 hz</span></label>
            <input type="range" id="highpass" min="20" max="2000" value="20" step="10">
        </div>
    </div>

    <script>
        // Audio context and nodes
        let audioContext;
        let noiseNode;
        let gainNode;
        let lowpassFilter;
        let highpassFilter;
        let isPlaying = false;
        let currentNoiseType = 'white';

        // UI elements
        const toggleButton = document.getElementById('toggleButton');
        const statusText = document.getElementById('status');
        const noiseTypeSelect = document.getElementById('noiseType');
        const volumeSlider = document.getElementById('volume');
        const lowpassSlider = document.getElementById('lowpass');
        const highpassSlider = document.getElementById('highpass');

        // Generate different types of noise
        function generateNoise(type, bufferSize, sampleRate) {
            const buffer = audioContext.createBuffer(1, bufferSize, sampleRate);
            const output = buffer.getChannelData(0);

            switch(type) {
                case 'white':
                    // White noise - equal power across frequencies
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }
                    break;

                case 'pink':
                    // Pink noise - 1/f power distribution
                    let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
                    for (let i = 0; i < bufferSize; i++) {
                        const white = Math.random() * 2 - 1;
                        b0 = 0.99886 * b0 + white * 0.0555179;
                        b1 = 0.99332 * b1 + white * 0.0750759;
                        b2 = 0.96900 * b2 + white * 0.1538520;
                        b3 = 0.86650 * b3 + white * 0.3104856;
                        b4 = 0.55000 * b4 + white * 0.5329522;
                        b5 = -0.7616 * b5 - white * 0.0168980;
                        output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                        b6 = white * 0.115926;
                    }
                    break;

                case 'brown':
                    // Brown/Brownian noise - 1/f² power distribution
                    let lastOut = 0;
                    for (let i = 0; i < bufferSize; i++) {
                        const white = Math.random() * 2 - 1;
                        output[i] = (lastOut + (0.02 * white)) / 1.02;
                        lastOut = output[i];
                        output[i] *= 3.5; // Amplify
                    }
                    break;

                case 'blue':
                    // Blue noise - opposite of pink, more high frequencies
                    let lastBlue = 0;
                    for (let i = 0; i < bufferSize; i++) {
                        const white = Math.random() * 2 - 1;
                        output[i] = white - lastBlue;
                        lastBlue = white;
                        output[i] *= 0.5; // Normalize
                    }
                    break;
            }

            return buffer;
        }

        function createNoiseGenerator() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            // Create noise buffer
            const bufferSize = 4 * audioContext.sampleRate;
            const noiseBuffer = generateNoise(currentNoiseType, bufferSize, audioContext.sampleRate);

            // Create source
            noiseNode = audioContext.createBufferSource();
            noiseNode.buffer = noiseBuffer;
            noiseNode.loop = true;

            // Create filters
            lowpassFilter = audioContext.createBiquadFilter();
            lowpassFilter.type = 'lowpass';
            lowpassFilter.frequency.value = parseFloat(lowpassSlider.value);

            highpassFilter = audioContext.createBiquadFilter();
            highpassFilter.type = 'highpass';
            highpassFilter.frequency.value = parseFloat(highpassSlider.value);

            // Create gain node
            gainNode = audioContext.createGain();
            gainNode.gain.value = volumeSlider.value / 100;

            // Connect: source -> highpass -> lowpass -> gain -> destination
            noiseNode.connect(highpassFilter);
            highpassFilter.connect(lowpassFilter);
            lowpassFilter.connect(gainNode);
            gainNode.connect(audioContext.destination);

            return noiseNode;
        }

        function startNoise() {
            const noise = createNoiseGenerator();
            noise.start();
            isPlaying = true;
            toggleButton.textContent = 'stop';
            toggleButton.classList.add('playing');
            statusText.textContent = `playing ${currentNoiseType} noise...`;
        }

        function stopNoise() {
            if (noiseNode) {
                noiseNode.stop();
                noiseNode = null;
            }
            isPlaying = false;
            toggleButton.textContent = 'play';
            toggleButton.classList.remove('playing');
            statusText.textContent = 'stopped';
        }

        // Event listeners
        toggleButton.addEventListener('click', () => {
            if (!isPlaying) {
                startNoise();
            } else {
                stopNoise();
            }
        });

        noiseTypeSelect.addEventListener('change', (e) => {
            currentNoiseType = e.target.value;
            if (isPlaying) {
                stopNoise();
                startNoise();
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            const value = e.target.value;
            document.getElementById('volumeValue').textContent = value;
            if (gainNode) {
                gainNode.gain.value = value / 100;
            }
        });

        lowpassSlider.addEventListener('input', (e) => {
            const value = e.target.value;
            document.getElementById('lowpassValue').textContent = value + ' hz';
            if (lowpassFilter) {
                lowpassFilter.frequency.value = parseFloat(value);
            }
        });

        highpassSlider.addEventListener('input', (e) => {
            const value = e.target.value;
            document.getElementById('highpassValue').textContent = value + ' hz';
            if (highpassFilter) {
                highpassFilter.frequency.value = parseFloat(value);
            }
        });
    </script>
</body>
</html>

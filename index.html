<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Noise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .controls {
            margin-top: 30px;
        }

        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 20px 50px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.playing {
            background: #ff6b6b;
            color: white;
        }

        .volume-control {
            margin-top: 30px;
        }

        .volume-control label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        input[type="range"] {
            width: 300px;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            border: none;
        }

        .status {
            margin-top: 20px;
            font-size: 1.1em;
            opacity: 0.8;
        }

        .gif-container {
            margin: 30px auto;
            text-align: center;
        }

        .gif-container img {
            width: 300px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>White Noise</h1>

        <div class="gif-container">
            <img src="seahorsegif.gif" alt="Seahorse animation" />
        </div>

        <p class="status" id="status">Click to start</p>

        <div class="controls">
            <button id="toggleButton">Play</button>
        </div>

        <div class="volume-control">
            <label for="volume">Volume</label>
            <input type="range" id="volume" min="0" max="100" value="50">
        </div>
    </div>

    <script>
        // White noise generator using Web Audio API
        let audioContext;
        let whiteNoiseNode;
        let gainNode;
        let isPlaying = false;

        const toggleButton = document.getElementById('toggleButton');
        const volumeSlider = document.getElementById('volume');
        const statusText = document.getElementById('status');

        // Create white noise
        function createWhiteNoise() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            const bufferSize = 2 * audioContext.sampleRate;
            const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = noiseBuffer.getChannelData(0);

            // Fill buffer with random values (white noise)
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            whiteNoiseNode = audioContext.createBufferSource();
            whiteNoiseNode.buffer = noiseBuffer;
            whiteNoiseNode.loop = true;

            // Create gain node for volume control
            gainNode = audioContext.createGain();
            gainNode.gain.value = volumeSlider.value / 100;

            // Connect nodes
            whiteNoiseNode.connect(gainNode);
            gainNode.connect(audioContext.destination);

            return whiteNoiseNode;
        }

        // Toggle play/stop
        toggleButton.addEventListener('click', () => {
            if (!isPlaying) {
                // Start playing
                const noise = createWhiteNoise();
                noise.start();
                isPlaying = true;
                toggleButton.textContent = 'Stop';
                toggleButton.classList.add('playing');
                statusText.textContent = 'Playing...';
            } else {
                // Stop playing
                if (whiteNoiseNode) {
                    whiteNoiseNode.stop();
                    whiteNoiseNode = null;
                }
                isPlaying = false;
                toggleButton.textContent = 'Play';
                toggleButton.classList.remove('playing');
                statusText.textContent = 'Stopped';
            }
        });

        // Volume control
        volumeSlider.addEventListener('input', (e) => {
            if (gainNode) {
                gainNode.gain.value = e.target.value / 100;
            }
        });
    </script>
</body>
</html>
